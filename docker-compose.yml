version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: anomaly_harvester_db
    environment:
      MYSQL_ROOT_PASSWORD: exorcism404
      MYSQL_DATABASE: anomaly_harvester
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
